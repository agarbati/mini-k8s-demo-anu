apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-api-config
data:
  WELCOME_URL: "http://{{ .Release.Name }}-welcome:{{ .Values.welcome.service.port }}/welcome"
  POSTGRES_HOST: "{{ .Release.Name }}-postgres"
  POSTGRES_DB: "{{ .Values.postgres.db.name }}"
  POSTGRES_USER: "{{ .Values.postgres.db.user }}"
  POSTGRES_PASSWORD: "{{ .Values.postgres.db.password }}"
  POSTGRES_PORT: "{{ .Values.postgres.service.port }}"
